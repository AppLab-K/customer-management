<body>

    <div id="app" class="container">
        <!-- ヘッダー -->
        <header class="app-header">
            <h1>📋 案件管理システム</h1>
            <div class="header-actions" id="headerActions">
                <!-- 動的にボタンを表示 -->
            </div>
        </header>

        <!-- メインコンテンツ -->
        <div id="mainContent"></div>
    </div>

    <!-- トースト -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        //  安全なエスケープ処理 (XSS対策)
        // ============================================================
        function escapeHTML(str) {
            if (str == null) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&apos;'
            };
            return String(str).replace(/[&<>"']/g, ch => map[ch]);
        }

        // ============================================================
        //  トースト通知
        // ============================================================
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ============================================================
        //  カスタム確認ダイアログ
        // ============================================================
        function showConfirmDialog(title, message) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box">
                        <h3>${escapeHTML(title)}</h3>
                        <p>${escapeHTML(message)}</p>
                        <div class="modal-actions">
                            <button class="btn btn-secondary" id="modalCancel">キャンセル</button>
                            <button class="btn btn-danger" id="modalOk">削除する</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                const close = (result) => {
                    overlay.remove();
                    resolve(result);
                };
                document.getElementById('modalCancel').addEventListener('click', () => close(false));
                document.getElementById('modalOk').addEventListener('click', () => close(true));
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close(false);
                });
            });
        }

        // ============================================================
        //  データ管理 (localStorage)
        // ============================================================
        const STORAGE_KEY_PROJECTS = 'kanri_projects_v2';
        const STORAGE_KEY_ASSIGNEES = 'kanri_assignees_v2';

        function loadProjects() {
            try {
                const data = localStorage.getItem(STORAGE_KEY_PROJECTS);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveProjects(projects) {
            try {
                localStorage.setItem(STORAGE_KEY_PROJECTS, JSON.stringify(projects));
            } catch (e) {
                showToast('データの保存に失敗しました', 'error');
            }
        }

        function loadAssignees() {
            try {
                const data = localStorage.getItem(STORAGE_KEY_ASSIGNEES);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveAssignees(assignees) {
            try {
                localStorage.setItem(STORAGE_KEY_ASSIGNEES, JSON.stringify(assignees));
            } catch (e) {
                showToast('データの保存に失敗しました', 'error');
            }
        }

        // ============================================================
        //  状態管理
        // ============================================================
        const state = {
            projects: loadProjects(),
            assignees: loadAssignees(),
            currentView: 'list',
            editingProjectId: null,
            sortBy: null,
            sortOrder: 'asc',
            priorityOrder: { '高': 3, '中': 2, '低': 1 },
            // フィルター状態
            filter: {
                keyword: '',
                status: '',
                priority: '',
                assignee: '',
                dueDateFrom: '',
                dueDateTo: ''
            }
        };

        // デフォルト担当者データがなければ作成
        if (state.assignees.length === 0) {
            state.assignees = [
                { id: 1, name: '山田 太郎', email: '[USER_EMAIL]' },
                { id: 2, name: '佐藤 花子', email: '[USER_EMAIL]' },
                { id: 3, name: '鈴木 一郎', email: '[USER_EMAIL]' },
            ];
            saveAssignees(state.assignees);
        }

        function getNextProjectId() {
            const projects = state.projects;
            if (projects.length === 0) return 1;
            return Math.max(...projects.map(p => p.id)) + 1;
        }

        function getNextAssigneeId() {
            const assignees = state.assignees;
            if (assignees.length === 0) return 1;
            return Math.max(...assignees.map(a => a.id)) + 1;
        }

        // ============================================================
        //  日付ユーティリティ
        // ============================================================
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr + 'T00:00:00');
            if (isNaN(d.getTime())) return dateStr;
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function getTodayStr() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function daysUntil(dueDateStr) {
            if (!dueDateStr) return null;
            const today = new Date(getTodayStr() + 'T00:00:00');
            const due = new Date(dueDateStr + 'T00:00:00');
            const diff = due.getTime() - today.getTime();
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        // ============================================================
        //  レンダリング
        // ============================================================
        const mainContent = document.getElementById('mainContent');
        const headerActions = document.getElementById('headerActions');

        function render() {
            switch (state.currentView) {
                case 'list':
                    renderList();
                    break;
                case 'form':
                    renderForm();
                    break;
                case 'assignee-manager':
                    renderAssigneeManager();
                    break;
                default:
                    renderList();
            }
        }

        // ---------- 案件一覧 (フィルター＋テーブル) ----------
        function renderList() {
            headerActions.innerHTML = `
                <button class="btn btn-primary" onclick="navigateToForm(null)">＋ 新規案件登録</button>
                <button class="btn btn-secondary" onclick="navigateToAssigneeManager()">👤 担当者管理</button>
            `;

            // ★ 修正: 全案件から期限3日以内の案件を抽出（フィルター前に実施）
            const allProjects = state.projects;
            const urgentProjects = allProjects.filter(p => {
                const days = daysUntil(p.dueDate);
                return days !== null && days >= 0 && days <= 3;
            });

            // フィルター適用
            let filtered = [...state.projects];

            // キーワード検索
            const kw = state.filter.keyword.trim().toLowerCase();
            if (kw) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(kw) ||
                    p.customer.toLowerCase().includes(kw) ||
                    (p.assignee && p.assignee.toLowerCase().includes(kw)) ||
                    (p.memo && p.memo.toLowerCase().includes(kw))
                );
            }

            // ステータス
            if (state.filter.status) {
                filtered = filtered.filter(p => p.status === state.filter.status);
            }
            // 優先度
            if (state.filter.priority) {
                filtered = filtered.filter(p => p.priority === state.filter.priority);
            }
            // 担当者
            if (state.filter.assignee) {
                filtered = filtered.filter(p => p.assignee === state.filter.assignee);
            }
            // 期限範囲
            if (state.filter.dueDateFrom) {
                filtered = filtered.filter(p => p.dueDate && p.dueDate >= state.filter.dueDateFrom);
            }
            if (state.filter.dueDateTo) {
                filtered = filtered.filter(p => p.dueDate && p.dueDate <= state.filter.dueDateTo);
            }

            // 並べ替え
            if (state.sortBy === 'priority') {
                const order = state.sortOrder === 'asc' ? 1 : -1;
                filtered.sort((a, b) => {
                    const pa = state.priorityOrder[a.priority] || 0;
                    const pb = state.priorityOrder[b.priority] || 0;
                    return (pa - pb) * order;
                });
            } else if (state.sortBy === 'dueDate') {
                const order = state.sortOrder === 'asc' ? 1 : -1;
                filtered.sort((a, b) => {
                    const da = a.dueDate ? new Date(a.dueDate).getTime() : 0;
                    const db = b.dueDate ? new Date(b.dueDate).getTime() : 0;
                    return (da - db) * order;
                });
            } else {
                filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }

            const isEmpty = filtered.length === 0;

            // フィルター用の担当者プルダウン
            let assigneeFilterOptions = '<option value="">すべての担当者</option>';
            state.assignees.forEach(a => {
                const selected = a.name === state.filter.assignee ? 'selected' : '';
                assigneeFilterOptions += `<option value="${escapeHTML(a.name)}" ${selected}>${escapeHTML(a.name)}</option>`;
            });

            // フィルターエリアHTML

        // ============================================================
        //  フォーム送信処理（ステータス変更履歴対応）
        // ============================================================
        function handleFormSubmit() {
            const isEditing = state.editingProjectId !== null;

            const name = document.getElementById('field_name').value.trim();
            const customer = document.getElementById('field_customer').value.trim();
            const assignee = document.getElementById('field_assignee').value;
            const priority = document.querySelector('input[name="priority"]:checked');
            const status = document.getElementById('field_status').value;
            const startDate = document.getElementById('field_startDate').value;
            const dueDate = document.getElementById('field_dueDate').value;
            const memo = document.getElementById('field_memo').value.trim();
            const priorityValue = priority ? priority.value : '中';

            let hasError = false;

            const errorName = document.getElementById('error_name');
            if (!name) {
                errorName.textContent = '案件名は必須です';
                document.getElementById('field_name').classList.add('error');
                hasError = true;
            } else {
                errorName.textContent = '';
                document.getElementById('field_name').classList.remove('error');
            }

            const errorCustomer = document.getElementById('error_customer');
            if (!customer) {
                errorCustomer.textContent = '顧客名は必須です';
                document.getElementById('field_customer').classList.add('error');
                hasError = true;
            } else {
                errorCustomer.textContent = '';
                document.getElementById('field_customer').classList.remove('error');
            }

            const errorDueDate = document.getElementById('error_dueDate');
            if (!dueDate) {
                errorDueDate.textContent = '期限は必須です';
                document.getElementById('field_dueDate').classList.add('error');
                hasError = true;
            } else {
                errorDueDate.textContent = '';
                document.getElementById('field_dueDate').classList.remove('error');
            }

            if (hasError) {
                showToast('入力内容にエラーがあります', 'error');
                return;
            }

            if (startDate && dueDate && startDate > dueDate) {
                showToast('開始日が期限より後の日付になっています', 'error');
                return;
            }

            const now = Date.now();

            if (isEditing) {
                const idx = state.projects.findIndex(p => p.id === state.editingProjectId);
                if (idx === -1) {
                    showToast('案件が見つかりませんでした', 'error');
                    navigateToList();
                    return;
                }
                const oldStatus = state.projects[idx].status;
                // ステータス変更履歴を記録（oldStatus === status の場合は履歴追加しない）
                const existingHistory = state.projects[idx].statusHistory || [];
                const updatedHistory = oldStatus !== status
                    ? [...existingHistory, { from: oldStatus, to: status, at: now }]
                    : existingHistory;

                state.projects[idx] = {
                    ...state.projects[idx],
                    name,
                    customer,
                    assignee,
                    priority: priorityValue,
                    status,
                    startDate,
                    dueDate,
                    memo,
                    updatedAt: now,
                    statusHistory: updatedHistory,
                };
                saveProjects(state.projects);
                showToast('案件を更新しました', 'success');
            } else {
                const newProject = {
                    id: getNextProjectId(),
                    name,
                    customer,
                    assignee,
                    priority: priorityValue,
                    status,
                    startDate,
                    dueDate,
                    memo,
                    createdAt: now,
                    updatedAt: now,
                    statusHistory: [{
                        from: '（新規）',
                        to: status,
                        at: now
                    }]
                };
                state.projects.push(newProject);
                saveProjects(state.projects);
                showToast('案件を登録しました', 'success');
            }

            navigateToList();
        }

            if (!name) {
                errorName.textContent = '氏名は必須です';
                nameInput.classList.add('error');
                hasError = true;
            } else {
                errorName.textContent = '';
                nameInput.classList.remove('error');
            }

            if (!email) {
                errorEmail.textContent = 'メールアドレスは必須です';
                emailInput.classList.add('error');
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorEmail.textContent = '正しいメールアドレス形式で入力してください';
                emailInput.classList.add('error');
                hasError = true;
            } else {
                errorEmail.textContent = '';
                emailInput.classList.remove('error');
            }

            if (!hasError && state.assignees.some(a => a.email === email)) {
                errorEmail.textContent = 'このメールアドレスは既に登録されています';
                emailInput.classList.add('error');
                hasError = true;
            }
            if (!hasError && state.assignees.some(a => a.name === name)) {
                errorName.textContent = 'この氏名は既に登録されています';
                nameInput.classList.add('error');
                hasError = true;
            }

            if (hasError) return;

            const newAssignee = {
                id: getNextAssigneeId(),
                name,
                email,
            };
            state.assignees.push(newAssignee);
            saveAssignees(state.assignees);
            showToast('担当者を追加しました', 'success');

            nameInput.value = '';
            emailInput.value = '';
            nameInput.focus();
            render();
        };

        // ============================================================
        //  担当者削除
        // ============================================================
        window.deleteAssignee = async function(assigneeId) {
            const assignee = state.assignees.find(a => a.id === assigneeId);
            if (!assignee) return;

            const usedIn = state.projects.filter(p => p.assignee === assignee.name);
            let message = `「${assignee.name}」を削除してもよろしいですか？`;
            if (usedIn.length > 0) {
                message = `「${assignee.name}」は ${usedIn.length} 件の案件に割り当てられています。削除すると担当者が解除されますが、よろしいですか？`;
            }

            const confirmed = await showConfirmDialog('担当者を削除', message);
            if (!confirmed) return;

            state.assignees = state.assignees.filter(a => a.id !== assigneeId);
            state.projects.forEach(p => {
                if (p.assignee === assignee.name) {
                    p.assignee = '';
                }
            });
            saveAssignees(state.assignees);
            saveProjects(state.projects);
            showToast('担当者を削除しました', 'success');
            render();
        };

        // ============================================================
        //  初期化（サンプルデータ）
        // ============================================================
        (function initSampleData() {
            if (state.projects.length === 0) {
                const now = Date.now();
                const sample = [{
                    id: getNextProjectId(),
                    name: 'Webサイトリニューアル',
                    customer: '株式会社テクノロジー',
                    assignee: '山田 太郎',
                    priority: '高',
                    status: '進行中',
                    startDate: '2025-04-01',
                    dueDate: (() => {
                        const d = new Date();
                        d.setDate(d.getDate() + 2);
                        return d.toISOString().slice(0, 10);
                    })(),
                    memo: 'コーポレートサイトの全面リニューアル。デザイン・CMS構築含む。',
                    createdAt: now - 86400000 * 2,
                    updatedAt: now - 86400000,
                    statusHistory: [
                        { from: '未着手', to: '進行中', at: now - 86400000 * 5 }
                    ]
                }, {
                    id: getNextProjectId(),
                    name: '社内業務効率化ツール開発',
                    customer: '自社',
                    assignee: '佐藤 花子',
                    priority: '中',
                    status: '未着手',
                    startDate: '',
                    dueDate: (() => {
                        const d = new Date();
                        d.setDate(d.getDate() + 30);
                        return d.toISOString().slice(0, 10);
                    })(),
                    memo: '勤怠管理・経費精算のシステム化。',
                    createdAt: now - 86400000 * 5,
                    updatedAt: now - 86400000 * 5,
                    statusHistory: []
                }, {
                    id: getNextProjectId(),
                    name: 'ECサイト決済システム連携',
                    customer: '株式会社ショップ',
                    assignee: '鈴木 一郎',
                    priority: '低',
                    status: '完了',
                    startDate: '2025-02-01',
                    dueDate: (() => {
                        const d = new Date();
                        d.setDate(d.getDate() - 5);
                        return d.toISOString().slice(0, 10);
                    })(),
                    memo: 'PayPay連携、クレジットカード決済リプレイス。',
                    createdAt: now - 86400000 * 60,
                    updatedAt: now - 86400000 * 10,
                    statusHistory: [
                        { from: '未着手', to: '進行中', at: now - 86400000 * 50 },
                        { from: '進行中', to: '完了', at: now - 86400000 * 10 }
                    ]
                }];
                state.projects.push(...sample);
                saveProjects(state.projects);
            }
        })();

        // ============================================================
        //  レンダリング開始
        // ============================================================
        render();

        // ============================================================
        //  グローバルエラーハンドリング
        // ============================================================
        window.addEventListener('error', (e) => {
            console.error('予期しないエラー:', e.error);
            showToast('システムエラーが発生しました', 'error');
        });

        console.log('✅ 案件管理システム initialized');
        console.log(`📊 案件数: ${state.projects.length}, 担当者数: ${state.assignees.length}`);
    </script>
