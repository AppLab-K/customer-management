<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案件管理システム</title>
    <style>
        /* ===== リセット & ベース ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
            background: #f5f7fa;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
        }

        /* ===== ヘッダー ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #111827;
        }
        .app-header .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .user-info .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3b82f6;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* ===== ボタン ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            text-decoration: none;
            line-height: 1.4;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
        }
        .btn-secondary:hover {
            background: #d1d5db;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .btn-success {
            background: #10b981;
            color: #fff;
        }
        .btn-success:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 12px;
        }
        .btn-ghost {
            background: transparent;
            color: #4b5563;
            padding: 6px 10px;
        }
        .btn-ghost:hover {
            background: #f3f4f6;
        }

        /* ===== カード ===== */
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 24px 28px;
            margin-bottom: 20px;
            transition: box-shadow 0.2s;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== 検索・フィルター ===== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .filter-bar .form-group {
            min-width: 140px;
            flex: 1 0 auto;
        }
        .filter-bar .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            display: block;
            margin-bottom: 2px;
        }
        .filter-bar .form-group input,
        .filter-bar .form-group select {
            padding: 8px 12px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            width: 100%;
        }
        .filter-bar .form-group input:focus,
        .filter-bar .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .filter-bar .btn {
            flex-shrink: 0;
            height: 38px;
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .search-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .search-row input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            outline: none;
        }
        .search-row .btn {
            height: 42px;
        }

        /* ===== フォーム ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }
        .form-group .required::after {
            content: " *";
            color: #ef4444;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background: #fff;
        }
        .form-group textarea {
            min-height: 90px;
            resize: vertical;
        }
        .form-group .error-text {
            font-size: 12px;
            color: #ef4444;
            min-height: 18px;
        }
        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .radio-group {
            display: flex;
            gap: 18px;
            padding-top: 6px;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        .radio-group input[type="radio"] {
            accent-color: #3b82f6;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .form-actions .btn {
            min-width: 120px;
        }

        /* ===== テーブル ===== */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table th {
            background: #f9fafb;
            color: #374151;
            font-weight: 600;
            padding: 12px 14px;
            text-align: left;
            border-bottom: 2px solid #e5e7eb;
            white-space: nowrap;
            cursor: default;
        }
        table th.sortable {
            cursor: pointer;
            user-select: none;
        }
        table th.sortable:hover {
            background: #f3f4f6;
        }
        table th.sortable::after {
            content: " ↕";
            font-size: 12px;
            opacity: 0.4;
        }
        table th.sortable.sorted-asc::after {
            content: " ↑";
            opacity: 1;
            color: #3b82f6;
        }
        table th.sortable.sorted-desc::after {
            content: " ↓";
            opacity: 1;
            color: #3b82f6;
        }
        table td {
            padding: 12px 14px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }
        table tr:hover td {
            background: #f9fafb;
        }
        table .actions-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .project-name-link {
            color: #2563eb;
            cursor: pointer;
            font-weight: 600;
        }
        .project-name-link:hover {
            text-decoration: underline;
        }

        /* 期限超過・期限間近 */
        .due-overdue {
            color: #dc2626;
            font-weight: 600;
        }
        .due-soon {
            background-color: #fef9c3;
        }
        .due-soon td {
            background-color: #fef9c3;
        }
        .due-soon:hover td {
            background-color: #fef08a;
        }

        .priority-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .priority-high {
            background: #fee2e2;
            color: #b91c1c;
        }
        .priority-medium {
            background: #fef9c3;
            color: #92400e;
        }
        .priority-low {
            background: #d1fae5;
            color: #065f46;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #e5e7eb;
            color: #374151;
        }
        .status-badge.status-progress {
            background: #dbeafe;
            color: #1e40af;
        }
        .status-badge.status-done {
            background: #d1fae5;
            color: #065f46;
        }
        .status-badge.status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        /* ===== 空の状態 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }
        .empty-state p {
            font-size: 16px;
            margin-top: 8px;
        }

        /* ===== 担当者管理 ===== */
        .assignee-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .assignee-form .form-group {
            flex: 1;
            min-width: 180px;
        }
        .assignee-form .btn {
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        /* ===== ページネーション ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
        .pagination .page-info {
            font-size: 14px;
            color: #6b7280;
        }
        .pagination .btn {
            min-width: 80px;
        }

        /* ===== トースト ===== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }
        .toast {
            padding: 14px 22px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.35s ease;
            max-width: 380px;
        }
        .toast-success {
            background: #10b981;
        }
        .toast-error {
            background: #ef4444;
        }
        .toast-info {
            background: #3b82f6;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== モーダル（詳細画面・共通） ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.2s ease;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #111827;
        }
        .modal-box .detail-item {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        .modal-box .detail-item .label {
            font-weight: 600;
            color: #6b7280;
            min-width: 100px;
        }
        .modal-box .detail-item .value {
            color: #1f2937;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== ユーティリティ ===== */
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .text-center { text-align: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .gap-8 { gap: 8px; }
        .hidden { display: none !important; }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .app-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .app-header .header-actions {
                width: 100%;
            }
            .app-header .header-actions .btn {
                flex: 1;
            }
            .card {
                padding: 16px;
            }
            .assignee-form {
                flex-direction: column;
                align-items: stretch;
            }
            .assignee-form .form-group {
                min-width: unset;
            }
            .form-actions .btn {
                min-width: 100px;
                flex: 1;
            }
            table th,
            table td {
                padding: 8px 10px;
                font-size: 13px;
            }
            .toast-container {
                left: 16px;
                right: 16px;
                bottom: 16px;
            }
            .toast {
                max-width: 100%;
            }
            .filter-bar .form-group {
                min-width: 100px;
            }
            .modal-box {
                padding: 20px;
                max-width: 95%;
            }
        }
    </style>
</head>
<body>

    <div id="app" class="container">
        <!-- ヘッダー -->
        <header class="app-header">
            <h1>📋 案件管理システム</h1>
            <div class="header-actions" id="headerActions">
                <div class="user-info">
                    <span class="avatar">U</span>
                    <span>ユーザー名</span>
                    <button class="btn btn-ghost btn-sm" title="設定">⚙️</button>
                </div>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <div id="mainContent"></div>
    </div>

    <!-- トースト -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        //  現在のユーザー情報（仮）
        // ============================================================
        const currentUser = {
            name: '管理者',
            email: 'admin@example.com'
        };

        // ============================================================
        //  安全なエスケープ処理 (XSS対策)
        // ============================================================
        function escapeHTML(str) {
            if (str == null) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&apos;'
            };
            return String(str).replace(/[&<>"']/g, ch => map[ch]);
        }

        // ============================================================
        //  トースト通知
        // ============================================================
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ============================================================
        //  カスタム確認ダイアログ
        // ============================================================
        function showConfirmDialog(title, message) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal-box" style="max-width:420px;text-align:center;">
                        <h3>${escapeHTML(title)}</h3>
                        <p style="color: #6b7280;">${escapeHTML(message)}</p>
                        <div class="modal-actions" style="justify-content:center;">
                            <button class="btn btn-secondary" id="modalCancel">キャンセル</button>
                            <button class="btn btn-danger" id="modalOk">削除する</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                const close = (result) => {
                    overlay.remove();
                    resolve(result);
                };

                overlay.querySelector('#modalCancel').addEventListener('click', () => close(false));
                overlay.querySelector('#modalOk').addEventListener('click', () => close(true));
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close(false);
                });
            });
        }

        // ============================================================
        //  データ管理 (localStorage)
        // ============================================================
        const STORAGE_KEY_PROJECTS = 'kanri_projects';
        const STORAGE_KEY_ASSIGNEES = 'kanri_assignees';

        function loadProjects() {
            try {
                const data = localStorage.getItem(STORAGE_KEY_PROJECTS);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveProjects(projects) {
            try {
                localStorage.setItem(STORAGE_KEY_PROJECTS, JSON.stringify(projects));
            } catch (e) {
                showToast('データの保存に失敗しました', 'error');
            }
        }

        function loadAssignees() {
            try {
                const data = localStorage.getItem(STORAGE_KEY_ASSIGNEES);
                return data ? JSON.parse(data) : [
                    { id: 1, name: '山田 太郎', email: currentUser.email },
                    { id: 2, name: '佐藤 花子', email: currentUser.email },
                    { id: 3, name: '鈴木 一郎', email: currentUser.email },
                ];
            } catch {
                return [];
            }
        }

        function saveAssignees(assignees) {
            try {
                localStorage.setItem(STORAGE_KEY_ASSIGNEES, JSON.stringify(assignees));
            } catch (e) {
                showToast('データの保存に失敗しました', 'error');
            }
        }

        // ============================================================
        //  状態管理
        // ============================================================
        const state = {
            projects: loadProjects(),
            assignees: loadAssignees(),
            currentView: 'list', // 'list' | 'form' | 'assignee-manager' | 'detail-modal'
            editingProjectId: null, // null = 新規, number = 編集
            detailProjectId: null, // 詳細モーダル表示用
            sortBy: null,
            sortOrder: 'asc',
            priorityOrder: { '高': 3, '中': 2, '低': 1 },
            // 検索・フィルター
            searchKeyword: '',
            filterStatus: '',
            filterPriority: '',
            filterAssignee: '',
            filterDueStart: '',
            filterDueEnd: '',
            // ページネーション
            currentPage: 1,
            itemsPerPage: 10,
        };

        function getNextProjectId() {
            const projects = state.projects;
            if (projects.length === 0) return 1;
            return Math.max(...projects.map(p => p.id)) + 1;
        }

        function getNextAssigneeId() {
            const assignees = state.assignees;
            if (assignees.length === 0) return 1;
            return Math.max(...assignees.map(a => a.id)) + 1;
        }

        // ============================================================
        //  ヘルパー: フィルタリング・ソート・ページネーション適用
        // ============================================================
        function getFilteredAndSortedProjects() {
            let projects = [...state.projects];

            // キーワード検索 (案件名・顧客名)
            const kw = state.searchKeyword.trim().toLowerCase();
            if (kw) {
                projects = projects.filter(p =>
                    p.name.toLowerCase().includes(kw) ||
                    (p.customer || '').toLowerCase().includes(kw)
                );
            }

            // フィルター
            if (state.filterStatus) {
                projects = projects.filter(p => p.status === state.filterStatus);
            }
            if (state.filterPriority) {
                projects = projects.filter(p => p.priority === state.filterPriority);
            }
            if (state.filterAssignee) {
                projects = projects.filter(p => p.assignee === state.filterAssignee);
            }
            if (state.filterDueStart) {
                projects = projects.filter(p => p.dueDate && p.dueDate >= state.filterDueStart);
            }
            if (state.filterDueEnd) {
                projects = projects.filter(p => p.dueDate && p.dueDate <= state.filterDueEnd);
            }

            // ソート
            if (state.sortBy) {
                const order = state.sortOrder === 'asc' ? 1 : -1;
                projects.sort((a, b) => {
                    let valA, valB;
                    switch (state.sortBy) {
                        case 'name':
                            valA = (a.name || '').toLowerCase();
                            valB = (b.name || '').toLowerCase();
                            return valA.localeCompare(valB) * order;
                        case 'customer':
                            valA = (a.customer || '').toLowerCase();
                            valB = (b.customer || '').toLowerCase();
                            return valA.localeCompare(valB) * order;
                        case 'assignee':
                            valA = (a.assignee || '').toLowerCase();
                            valB = (b.assignee || '').toLowerCase();
                            return valA.localeCompare(valB) * order;
                        case 'priority':
                            valA = state.priorityOrder[a.priority] || 0;
                            valB = state.priorityOrder[b.priority] || 0;
                            return (valA - valB) * order;
                        case 'status':
                            valA = (a.status || '').toLowerCase();
                            valB = (b.status || '').toLowerCase();
                            return valA.localeCompare(valB) * order;
                        case 'dueDate':
                            valA = a.dueDate || '';
                            valB = b.dueDate || '';
                            if (valA < valB) return -1 * order;
                            if (valA > valB) return 1 * order;
                            return 0;
                        default:
                            return 0;
                    }
                });
            } else {
                // デフォルトは作成日降順
                projects.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }

            return projects;
        }

        function getPaginatedProjects(projects) {
            const start = (state.currentPage - 1) * state.itemsPerPage;
            const end = start + state.itemsPerPage;
            return projects.slice(start, end);
        }

        function getTotalPages(projects) {
            return Math.ceil(projects.length / state.itemsPerPage) || 1;
        }

                    break;
                case 'assignee-manager':
                    renderAssigneeManager();
                    break;
                case 'detail-modal':
                    renderDetailModal();
                    break;
                default:
                    renderList();
            }
        }

        // ============================================================

            if (state.sortBy === field) {
                state.sortOrder = state.sortOrder === 'asc' ? 'desc' : 'asc';

                state.sortBy = field;
                state.sortOrder = 'asc';
            }

            render();

            state.filterAssignee = '';

            state.filterDueEnd = '';
            state.currentPage = 1;

        // ============================================================
        //  ページネーション
        // ============================================================
        window.changePage = function(delta) {
            const filtered = getFilteredAndSortedProjects();
            const totalPages = getTotalPages(filtered);
            const newPage = state.currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            state.currentPage = newPage;
            render();
        };

        // ============================================================
        //  CSVエクスポート
        // ============================================================
        window.exportCSV = function() {
            const projects = state.projects;
            if (projects.length === 0) {
                showToast('エクスポートする案件がありません', 'info');
                return;
            }

            // ヘッダー行
            const headers = ['案件名', '顧客名', '担当者', '優先度', 'ステータス', '開始日', '期限', 'メモ'];
            const rows = projects.map(p => [
                p.name || '',
                p.customer || '',
                p.assignee || '',
                p.priority || '',
                p.status || '',
                p.startDate || '',
                p.dueDate || '',
                (p.memo || '').replace(/\n/g, '\\n') // メモ内改行をエスケープ
            ]);

            // CSV文字列生成 (ダブルクォートで囲む)
            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(','))
                .join('\n');

            // BOM付きUTF-8
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `案件一覧_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('CSVをエクスポートしました', 'success');
        };

        // ============================================================
        //  フォーム送信処理
        // ============================================================
        function handleFormSubmit() {
            const isEditing = state.editingProjectId !== null;

            const name = document.getElementById('field_name').value.trim();
            const customer = document.getElementById('field_customer').value.trim();
            const assignee = document.getElementById('field_assignee').value;
            const priority = document.querySelector('input[name="priority"]:checked');
            const status = document.getElementById('field_status').value;
            const startDate = document.getElementById('field_startDate').value;
            const dueDate = document.getElementById('field_dueDate').value;
            const memo = document.getElementById('field_memo').value.trim();

            const priorityValue = priority ? priority.value : '中';

            let hasError = false;

            const errorName = document.getElementById('error_name');
            if (!name) {
                errorName.textContent = '案件名は必須です';
                document.getElementById('field_name').classList.add('error');
                hasError = true;
            } else {
                errorName.textContent = '';
                document.getElementById('field_name').classList.remove('error');
            }

            const errorCustomer = document.getElementById('error_customer');
            if (!customer) {
                errorCustomer.textContent = '顧客名は必須です';
                document.getElementById('field_customer').classList.add('error');
                hasError = true;
            } else {
                errorCustomer.textContent = '';
                document.getElementById('field_customer').classList.remove('error');
            }

            const errorDueDate = document.getElementById('error_dueDate');
            if (!dueDate) {
                errorDueDate.textContent = '期限は必須です';
                document.getElementById('field_dueDate').classList.add('error');
                hasError = true;
            } else {
                errorDueDate.textContent = '';
                document.getElementById('field_dueDate').classList.remove('error');
            }

            if (hasError) {
                showToast('入力内容にエラーがあります', 'error');
                return;
            }

            if (startDate && dueDate && startDate > dueDate) {
                showToast('開始日が期限より後の日付になっています', 'error');
                return;
            }

            const now = Date.now();
            if (isEditing) {
                const idx = state.projects.findIndex(p => p.id === state.editingProjectId);
                if (idx === -1) {
                    showToast('案件が見つかりませんでした', 'error');
                    navigateToList();
                    return;
                }
                state.projects[idx] = {
                    ...state.projects[idx],
                    name,
                    customer,
                    assignee,
                    priority: priorityValue,
                    status,
                    startDate,
                    dueDate,
                    memo,
                    updatedAt: now,
                };
                saveProjects(state.projects);
                showToast('案件を更新しました', 'success');
            } else {
                const newProject = {
                    id: getNextProjectId(),
                    name,
                    customer,
                    assignee,
                    priority: priorityValue,
                    status,
                    startDate,
                    dueDate,
                    memo,
                    createdAt: now,
                    updatedAt: now,
                };
                state.projects.push(newProject);
                saveProjects(state.projects);
                showToast('案件を登録しました', 'success');
            }

            navigateToList();
        }

        // ============================================================
        //  案件削除（一覧画面から）
        // ============================================================
        window.deleteProject = async function(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            if (!project) return;

            const confirmed = await showConfirmDialog(
                '案件を削除',
                `「${project.name}」を削除してもよろしいですか？この操作は元に戻せません。`
            );
            if (!confirmed) return;

            state.projects = state.projects.filter(p => p.id !== projectId);
            saveProjects(state.projects);
            showToast('案件を削除しました', 'success');
            render();
        };

        // ============================================================
        //  案件削除（フォーム画面から）
        // ============================================================
        window.deleteProjectFromForm = async function() {
            if (state.editingProjectId === null) return;
            const project = state.projects.find(p => p.id === state.editingProjectId);
            if (!project) return;

            const confirmed = await showConfirmDialog(
                '案件を削除',
                `「${project.name}」を削除してもよろしいですか？この操作は元に戻せません。`
            );
            if (!confirmed) return;

            state.projects = state.projects.filter(p => p.id !== state.editingProjectId);
            saveProjects(state.projects);
            showToast('案件を削除しました', 'success');
            navigateToList();
        };

        // ============================================================
        //  担当者追加
        // ============================================================
        window.addAssignee = function() {
            const nameInput = document.getElementById('newAssigneeName');
            const emailInput = document.getElementById('newAssigneeEmail');
            const errorName = document.getElementById('error_assigneeName');
            const errorEmail = document.getElementById('error_assigneeEmail');

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            let hasError = false;

            if (!name) {
                errorName.textContent = '氏名は必須です';
                nameInput.classList.add('error');
                hasError = true;
            } else {
                errorName.textContent = '';
                nameInput.classList.remove('error');
            }

            if (!email) {
                errorEmail.textContent = 'メールアドレスは必須です';
                emailInput.classList.add('error');
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorEmail.textContent = '正しいメールアドレス形式で入力してください';
                emailInput.classList.add('error');
                hasError = true;
            } else {
                errorEmail.textContent = '';
                emailInput.classList.remove('error');
            }

            // 重複チェック
            if (!hasError && state.assignees.some(a => a.email === email)) {
                errorEmail.textContent = 'このメールアドレスは既に登録されています';
                emailInput.classList.add('error');
                hasError = true;
            }
            if (!hasError && state.assignees.some(a => a.name === name)) {
                errorName.textContent = 'この氏名は既に登録されています';
                nameInput.classList.add('error');
                hasError = true;
            }

            if (hasError) return;

            const newAssignee = {
                id: getNextAssigneeId(),
                name,
                email,
            };
            state.assignees.push(newAssignee);
            saveAssignees(state.assignees);
            showToast('担当者を追加しました', 'success');

            nameInput.value = '';
            emailInput.value = '';
            nameInput.focus();

            render();
        };

        // ============================================================
        //  担当者削除
        // ============================================================
        window.deleteAssignee = async function(assigneeId) {
            const assignee = state.assignees.find(a => a.id === assigneeId);
            if (!assignee) return;

            const usedIn = state.projects.filter(p => p.assignee === assignee.name);
            let message = `「${assignee.name}」を削除してもよろしいですか？`;
            if (usedIn.length > 0) {
                message = `「${assignee.name}」は ${usedIn.length} 件の案件に割り当てられています。削除すると担当者が解除されますが、よろしいですか？`;
            }

            const confirmed = await showConfirmDialog('担当者を削除', message);
            if (!confirmed) return;

            state.assignees = state.assignees.filter(a => a.id !== assigneeId);
            state.projects.forEach(p => {
                if (p.assignee === assignee.name) {
                    p.assignee = '';
                }
            });
            saveAssignees(state.assignees);
            saveProjects(state.projects);
            showToast('担当者を削除しました', 'success');
            render();
        };

        // ============================================================
        //  初期化
        // ============================================================
        (function initSampleData() {
            if (state.projects.length === 0 && state.assignees.length > 0) {
                const sample = [
                    { id: getNextProjectId(), name: 'Webサイトリニューアル', customer: '株式会社テクノロジー', assignee: '山田 太郎', priority: '高', status: '進行中', startDate: '2025-04-01', dueDate: '2025-06-30', memo: 'コーポレートサイトの全面リニューアル。デザイン・CMS構築含む。', createdAt: Date.now() - 86400000 * 2, updatedAt: Date.now() - 86400000 },
                    { id: getNextProjectId(), name: '社内業務効率化ツール開発', customer: '自社', assignee: '佐藤 花子', priority: '中', status: '未着手', startDate: '', dueDate: '2025-08-15', memo: '勤怠管理・経費精算のシステム化。', createdAt: Date.now() - 86400000 * 5, updatedAt: Date.now() - 86400000 * 5 },
                    { id: getNextProjectId(), name: 'ECサイト決済システム連携', customer: '株式会社ショップ', assignee: '鈴木 一郎', priority: '低', status: '完了', startDate: '2025-02-01', dueDate: '2025-04-10', memo: 'PayPay連携、クレジットカード決済リプレイス。', createdAt: Date.now() - 86400000 * 60, updatedAt: Date.now() - 86400000 * 10 },
                ];
                state.projects.push(...sample);
                saveProjects(state.projects);
            }
        })();

        // レンダリング開始
        render();

        // ============================================================
        //  グローバルエラーハンドリング
        // ============================================================
        window.addEventListener('error', (e) => {
            console.error('予期しないエラー:', e.error);
            showToast('システムエラーが発生しました', 'error');
        });

        console.log('✅ 案件管理システム initialized');
        console.log(`📊 案件数: ${state.projects.length}, 担当者数: ${state.assignees.length}`);
    </script>
